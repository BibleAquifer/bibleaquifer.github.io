    "title": "UBS Dictionary of the Greek New Testament",
    "resource_type": "Semantic Lexicon"
  }
};
const ORG_NAME = 'BibleAquifer';

// DOM elements
const resourceSelect = document.getElementById('resource-select');
const languageSelect = document.getElementById('language-select');
const fileSelect = document.getElementById('file-select');
const fileSelectorGroup = document.getElementById('file-selector-group');
const contentDisplayDiv = document.getElementById('content-display');
const contentViewerSection = document.getElementById('content-viewer');
const previewDisplayDiv = document.getElementById('preview-display');
const tabBtns = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
const prevArticleBtn = document.getElementById('prev-article-btn');
const nextArticleBtn = document.getElementById('next-article-btn');
const articlePositionSpan = document.getElementById('article-position');
const fileDownloadBar = document.getElementById('file-download-bar');
const fileDownloadLinks = document.getElementById('file-download-links');

// State
let selectedResource = null;
let selectedLanguage = null;
let selectedJsonPath = null;
let previewLoaded = false;
let previewCache = {};
let currentArticleIndex = 0;
let currentArticles = [];
let navDataCache = {};  // Cache for nav data (json_files) loaded per resource+language

// Right-to-left language codes
const RTL_LANGUAGES = ['arb', 'apd', 'heb', 'fas', 'urd', 'prs', 'syr', 'yid'];

// Check if a language code is RTL
function isRtlLanguage(langCode) {
    return RTL_LANGUAGES.includes(langCode);
}

// Load nav data (json_files) for a resource+language combination
async function loadNavData(resourceName, langCode) {
    const cacheKey = `${resourceName}_${langCode}`;
    
    // Return cached data if available
    if (navDataCache[cacheKey]) {
        return navDataCache[cacheKey];
    }
    
    try {
        const navUrl = `nav/${resourceName}_${langCode}.json`;
        const response = await fetch(navUrl);
        if (!response.ok) {
            console.warn(`Nav file not found: ${navUrl} (status: ${response.status})`);
            return [];
        }
        const data = await response.json();
        navDataCache[cacheKey] = data;
        return data;
    } catch (error) {
        // This often happens when opening the file directly (file:// protocol)
        // instead of serving it via a web server
        console.warn('Error loading nav data. If viewing locally, please use a web server (e.g., python -m http.server):', error.message);
        return [];
    }
}

// Setup event listeners
resourceSelect.addEventListener('change', handleResourceChange);
languageSelect.addEventListener('change', handleLanguageChange);
fileSelect.addEventListener('change', handleFileChange);

// Navigation button event listeners
prevArticleBtn.addEventListener('click', () => {
    if (currentArticleIndex > 0) {
        currentArticleIndex--;
        displayArticle();
    }
});

nextArticleBtn.addEventListener('click', () => {
    if (currentArticleIndex < currentArticles.length - 1) {
        currentArticleIndex++;
        displayArticle();
    }
});

// Tab switching
tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        switchToTab(tabId);
    });
});

// Switch to a specific tab
function switchToTab(tabId) {
    // Update active states
    tabBtns.forEach(b => b.classList.remove('active'));
    tabContents.forEach(c => c.classList.remove('active'));
    
    const targetBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
    if (targetBtn) {
        targetBtn.classList.add('active');
    }
    document.getElementById('tab-' + tabId).classList.add('active');
    
    // Load preview if switching to preview tab
    if (tabId === 'preview' && selectedResource && selectedLanguage) {
        loadPreview();
    }
}

// Load preview content dynamically
async function loadPreview() {
    if (!selectedResource || !selectedLanguage) {
        hideNavigation();
        previewDisplayDiv.innerHTML = '<p class="loading-message">Select a resource to see a preview.</p>';
        return;
    }
    
    const langData = selectedResource.languages[selectedLanguage];
    if (!langData) {
        hideNavigation();
        previewDisplayDiv.innerHTML = '<p class="no-preview">No preview available for this selection.</p>';
        return;
    }
    
    // Use selectedJsonPath if set, otherwise fall back to first_json_path
    const jsonPath = selectedJsonPath || langData.first_json_path;
    if (!jsonPath || !langData.has_json) {
        hideNavigation();
        previewDisplayDiv.innerHTML = '<p class="no-preview">No preview available. This resource does not have JSON content files.</p>';
        return;
    }
    
    // Check cache first - use delimiter-separated key
    const cacheKey = `${selectedResource.name}:${selectedLanguage}:${jsonPath}`;
    if (previewCache[cacheKey]) {
        currentArticles = previewCache[cacheKey];
        currentArticleIndex = 0;
        displayArticle();
        return;
    }
    
    // Show loading message and hide navigation while loading
    hideNavigation();
    previewDisplayDiv.innerHTML = '<p class="loading-message">Loading preview...</p>';
    
    try {
        // Construct URL to raw JSON file
        const url = `https://raw.githubusercontent.com/${ORG_NAME}/${selectedResource.name}/main/${selectedLanguage}/${jsonPath}`;
        
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('Failed to fetch preview content');
        }
        
        const data = await response.json();
        
        // Extract articles from the data array
        // SECURITY NOTE: content is trusted HTML from the BibleAquifer organization's own 
        // JSON files. This is intentionally rendered as HTML to support rich formatting 
        // (headings, paragraphs, links, etc.) in the preview.
        if (Array.isArray(data) && data.length > 0) {
            // Store articles in cache and state
            currentArticles = data;
            previewCache[cacheKey] = data;
            currentArticleIndex = 0;
            displayArticle();
        } else {
            hideNavigation();
            previewDisplayDiv.innerHTML = '<p class="no-preview">No preview content found in the JSON file.</p>';
        }
    } catch (error) {
        console.error('Error loading preview:', error);
        hideNavigation();
        previewDisplayDiv.innerHTML = '<p class="error-message">Error loading preview. Please try again later.</p>';
    }
}

// Scope <style> blocks in article content to .preview-content so they don't
// leak out and affect the rest of the page. Rewrites each selector by prepending
// the scope, except @-rules (kept as-is) and html/body/:root (replaced by scope).
function scopeArticleStyles(html, scope) {
    return html.replace(/<style([^>]*)>([\s\S]*?)<\/style>/gi, (match, attrs, css) => {
        const scoped = css.replace(/([^{}]+)\{/g, (ruleMatch, selectors) => {
            const trimmed = selectors.trim();
            if (!trimmed || trimmed.startsWith('@')) return ruleMatch;
            const scopedSelectors = selectors.split(',').map(sel => {
                const s = sel.trim();
                if (!s) return s;
                if (/^(html|body|:root)$/i.test(s)) return scope;
                return `${scope} ${s}`;
            }).join(', ');
            return `${scopedSelectors} {`;
        });
        return `<style${attrs}>${scoped}</style>`;
    });
}

// Rewrite relative image src attributes to absolute raw.githubusercontent.com URLs.
// External URLs (http/https/protocol-relative/data) are left unchanged.
// Also removes <a href="#..."> anchor links (useless in the preview context),
// replacing them with their inner content.
function resolveRelativeUrls(html, baseUrl) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('img[src]').forEach(img => {
        const src = img.getAttribute('src');
        if (src && !src.match(/^(https?:|\/\/|data:)/)) {
            img.setAttribute('src', baseUrl + src);
        }
    });
    tmp.querySelectorAll('a[href^="#"]').forEach(a => {
        a.replaceWith(...a.childNodes);
    });
    return tmp.innerHTML;
}

// Display the current article based on index
function displayArticle() {
    if (!currentArticles || currentArticles.length === 0) {
        hideNavigation();
        previewDisplayDiv.innerHTML = '<p class="no-preview">No articles available.</p>';
        return;
    }

    const article = currentArticles[currentArticleIndex];
    if (!article || !article.content) {
        previewDisplayDiv.innerHTML = '<p class="no-preview">Article content not available.</p>';
        updateNavigationState();
        return;
    }

    const title = article.title || '';
    const titleHtml = title && !article.content.trimStart().match(/^<(style|h1)/i)
        ? `<p><b>${title}</b></p>` : '';

    // Build base URL for resolving relative image paths within the JSON content directory
    const jsonDir = selectedJsonPath && selectedJsonPath.includes('/')
        ? selectedJsonPath.split('/').slice(0, -1).join('/') + '/'
        : '';
    const imageBaseUrl = `https://raw.githubusercontent.com/${ORG_NAME}/${selectedResource.name}/main/${selectedLanguage}/${jsonDir}`;
    const resolvedContent = scopeArticleStyles(
        resolveRelativeUrls(article.content, imageBaseUrl), '.preview-content');

    // Apply RTL direction for right-to-left languages
    const dirAttr = isRtlLanguage(selectedLanguage) ? ' dir="rtl"' : '';
    const previewHtml = '<div class="preview-content"' + dirAttr + '>' + titleHtml + resolvedContent + '</div>';
    previewDisplayDiv.innerHTML = previewHtml;

    updateNavigationState();
    updateDownloadBar();
}

// Update navigation button states and position indicator
function updateNavigationState() {
    const total = currentArticles.length;
    const current = currentArticleIndex + 1;
    
    // Update position indicator
    articlePositionSpan.textContent = `Article ${current} of ${total}`;
    
    // Update button states
    prevArticleBtn.disabled = currentArticleIndex === 0;
    nextArticleBtn.disabled = currentArticleIndex >= total - 1;
}

// Hide navigation controls
function hideNavigation() {
    prevArticleBtn.disabled = true;
    nextArticleBtn.disabled = true;
    articlePositionSpan.textContent = '';
}

// Update the file download bar with per-file format links
function updateDownloadBar() {
    if (!selectedResource || !selectedLanguage) {
        fileDownloadBar.style.display = 'none';
        return;
    }

    const langData = selectedResource.languages[selectedLanguage];
    if (!langData) {
        fileDownloadBar.style.display = 'none';
        return;
    }

    const jsonPath = selectedJsonPath || langData.first_json_path;
    if (!jsonPath) {
        fileDownloadBar.style.display = 'none';
        return;
    }

    // Look up pregenerated format paths from nav data cache
    const cacheKey = `${selectedResource.name}_${selectedLanguage}`;
    const navEntries = navDataCache[cacheKey] || [];
    const currentEntry = navEntries.find(e => e.path === jsonPath);
    const entryFormats = currentEntry ? currentEntry.formats : null;

    const links = [];
    const baseUrl = `https://raw.githubusercontent.com/${ORG_NAME}/${selectedResource.name}/main/${selectedLanguage}`;

    if (entryFormats) {
        // Use pregenerated format paths from nav data
        const formatLabels = [
            { key: 'json', label: 'JSON' },
            { key: 'md', label: 'Markdown' },
            { key: 'pdf', label: 'PDF' },
            { key: 'docx', label: 'DOCX' },
            { key: 'usfm', label: 'USFM' },
            { key: 'usx', label: 'USX' },
            { key: 'audio', label: 'Audio' },
            { key: 'alignments', label: 'Alignments' }
        ];
        formatLabels.forEach(fmt => {
            if (entryFormats[fmt.key]) {
                links.push(`<a href="${baseUrl}/${entryFormats[fmt.key]}" target="_blank">${fmt.label}</a>`);
            }
        });
    } else {
        // Fallback: simple path substitution (when nav data not loaded)
        const basename = jsonPath.replace(/^json\//, '').replace(/\.json$/, '');
        [
            { flag: 'has_json', dir: 'json', ext: 'json', label: 'JSON' },
            { flag: 'has_md', dir: 'md', ext: 'md', label: 'Markdown' },
            { flag: 'has_pdf', dir: 'pdf', ext: 'pdf', label: 'PDF' },
            { flag: 'has_docx', dir: 'docx', ext: 'docx', label: 'DOCX' }
        ].forEach(fmt => {
            if (langData[fmt.flag]) {
                links.push(`<a href="${baseUrl}/${fmt.dir}/${basename}.${fmt.ext}" target="_blank">${fmt.label}</a>`);
            }
        });
    }

    if (links.length > 0) {
        fileDownloadLinks.innerHTML = links.join(' <span class="file-download-sep">·</span> ');
        fileDownloadBar.style.display = 'flex';
    } else {
        fileDownloadBar.style.display = 'none';
    }
}

// Reset article state when resource or language changes
function resetArticleState() {
    currentArticleIndex = 0;
    currentArticles = [];
    hideNavigation();
    fileDownloadBar.style.display = 'none';
}

// Reset file selector state
function resetFileSelector() {
    fileSelect.innerHTML = '<option value="">Select a language first</option>';
    fileSelect.disabled = true;
    fileSelectorGroup.style.display = 'none';
    selectedJsonPath = null;
}

// Populate file selector with JSON files for the current language
async function populateFileSelector() {
    if (!selectedResource || !selectedLanguage) {
        resetFileSelector();
        return;
    }
    
    const langData = selectedResource.languages[selectedLanguage];
    if (!langData) {
        resetFileSelector();
        return;
    }
    
    // Load nav data dynamically
    const jsonFiles = await loadNavData(selectedResource.name, selectedLanguage);
    console.log(`Loaded ${jsonFiles.length} files for ${selectedResource.name}/${selectedLanguage}`);
    
    if (!jsonFiles || jsonFiles.length === 0) {
        console.log('No nav data available, falling back to first_json_path:', langData.first_json_path);
        resetFileSelector();
        // Fall back to first_json_path if available
        if (langData.first_json_path) {
            selectedJsonPath = langData.first_json_path;
        }
        return;
    }
    
    console.log('Showing file selector with', jsonFiles.length, 'options');
    
    // Clear and populate file selector
    fileSelect.innerHTML = '';
    
    jsonFiles.forEach((file, index) => {
        const option = document.createElement('option');
        option.value = file.path;
        option.textContent = file.label;
        if (index === 0) {
            option.selected = true;
        }
        fileSelect.appendChild(option);
    });
    
    fileSelect.disabled = false;
    fileSelectorGroup.style.display = 'block';
    
    // Set default selected path to first file
    selectedJsonPath = jsonFiles[0].path;
}

// Handle file selection change
function handleFileChange() {
    selectedJsonPath = fileSelect.value;
    
    if (!selectedJsonPath) {
        return;
    }
    
    // Reset article state when file changes
    resetArticleState();
    previewDisplayDiv.innerHTML = '<p class="loading-message">Loading preview...</p>';
    
    // Switch to Preview tab and load preview
    switchToTab('preview');
}

// Handle resource selection
async function handleResourceChange() {
    const resourceId = resourceSelect.value;
    
    if (!resourceId) {
        languageSelect.innerHTML = '<option value="">Select a resource first</option>';
        languageSelect.disabled = true;
        contentDisplayDiv.innerHTML = '';
        previewDisplayDiv.innerHTML = '<p class="loading-message">Select a resource to see a preview.</p>';
        contentViewerSection.classList.add('hidden');
        resetArticleState();
        resetFileSelector();
        return;
    }
    
    selectedResource = RESOURCES_DATA[resourceId];
    resetArticleState();
    resetFileSelector();
    
    // Populate language dropdown
    languageSelect.innerHTML = '<option value="">Select a language...</option>';
    
    const languages = Object.values(selectedResource.languages).sort((a, b) => 
        a.name.localeCompare(b.name)
    );
    
    const hasEng = languages.some(lang => lang.code === 'eng');
    
    // Determine default language: English if available, otherwise first alphabetically sorted language
    const defaultLang = hasEng ? 'eng' : (languages.length > 0 ? languages[0].code : null);
    
    languages.forEach(lang => {
        const option = document.createElement('option');
        option.value = lang.code;
        option.textContent = lang.name;
        if (lang.code === defaultLang) {
            option.selected = true;
        }
        languageSelect.appendChild(option);
    });
    
    languageSelect.disabled = false;
    
    // Switch to Details tab when resource changes
    switchToTab('details');
    
    // Reset preview display
    previewDisplayDiv.innerHTML = '<p class="loading-message">Loading preview...</p>';
    
    // Auto-load default language if available
    if (defaultLang) {
        selectedLanguage = defaultLang;
        await populateFileSelector();
        displayLanguageMetadata();
    }
}

// Handle language selection
async function handleLanguageChange() {
    selectedLanguage = languageSelect.value;
    
    if (!selectedLanguage) {
        contentDisplayDiv.innerHTML = '';
        previewDisplayDiv.innerHTML = '<p class="loading-message">Select a resource to see a preview.</p>';
        contentViewerSection.classList.add('hidden');
        resetArticleState();
        resetFileSelector();
        return;
    }
    
    // Switch to Details tab when language changes
    switchToTab('details');
    
    // Reset preview and article state when language changes
    resetArticleState();
    previewDisplayDiv.innerHTML = '<p class="loading-message">Loading preview...</p>';
    
    // Populate file selector for the new language
    await populateFileSelector();
    
    displayLanguageMetadata();
}

// Display language metadata
function displayLanguageMetadata() {
    if (!selectedResource || !selectedLanguage) return;
    
    const langData = selectedResource.languages[selectedLanguage];
    if (!langData) {
        contentDisplayDiv.innerHTML = '<p>No metadata available for this language.</p>';
        return;
    }
    
    let html = '';
    
    // Display resource title and description at the top
    //    html += `<div class="resource-header">`;
    //    html += `<h3>${selectedResource.title}</h3>`;
    //    html += `<p>${selectedResource.description || 'No description available'}</p>`;
    //    html += `<p><a href="${selectedResource.url}" target="_blank">View on GitHub</a></p>`;
    //    html += `</div>`;
    //    html += '<hr style="margin: 1.5rem 0;">';
    
    // Display citation if available
    if (langData.citation && (langData.citation.title || langData.citation.copyright_statement)) {
        html += '<h3>Citation</h3>';

        if (langData.citation.copyright_statement) {
            // Use the licensor-provided statement directly (trusted HTML from metadata)
            html += `<div class="citation">${langData.citation.copyright_statement}</div>`;
        } else {
            html += '<p class="citation">';
            html += `<em>${langData.citation.title}</em>`;

            if (langData.citation.copyright_holder) {
                html += `. &copy; ${langData.citation.copyright_dates || ''} ${langData.citation.copyright_holder}`;
            }

            if (langData.citation.license_name) {
                html += `. Licensed under ${langData.citation.license_name}`;
            }

            html += '.</p>';
        }

        // Add adaptation notice if available
        if (langData.citation.adaptation_notice) {
            html += `<div class="adaptation-notice">${langData.citation.adaptation_notice}</div>`;
        }

        html += '<hr style="margin: 1.5rem 0;">';
    }
    
    // Create two-column layout for Resource Information and Access Resource
    html += '<div class="resource-details-columns">';
    
    // Left column: Resource Information
    html += '<div class="resource-info-column">';
    html += '<h3>Resource Information</h3>';
    html += '<div class="metadata-grid">';
    
    const metadataFields = [
        { label: 'Title', value: langData.title },
        { label: 'Language', value: langData.language },
        { label: 'Resource Version', value: selectedResource.release_tag ? `<a href="https://github.com/${ORG_NAME}/${selectedResource.name}/releases/tag/${selectedResource.release_tag}" target="_blank">${selectedResource.release_tag}</a>` : null },
        { label: 'Schema Version', value: langData.version },
        { label: 'Type', value: langData.resource_type },
        { label: 'Content Type', value: langData.content_type }
    ];
    
    metadataFields.forEach(field => {
        if (field.value) {
            html += `
                <div class="metadata-label">${field.label}:</div>
                <div class="metadata-value">${field.value}</div>
            `;
        }
    });
    
    html += '</div>';
    html += '</div>'; // Close resource-info-column
    
    // Right column: Access Resource
    html += '<div class="resource-access-column">';
    html += '<h3>Access Resource</h3>';
    html += '<p>Browse or download this resource:</p>';
    html += '<ul class="download-list">';
    
    // Dynamically check and add links for all available formats
    const formats = [
        { key: 'has_json', name: 'JSON', label: 'Browse JSON files' },
        { key: 'has_md', name: 'Markdown', label: 'Browse Markdown files' },
        { key: 'has_pdf', name: 'PDF', label: 'Browse PDF files' },
        { key: 'has_docx', name: 'DOCX', label: 'Browse DOCX files' },
        { key: 'has_usx', name: 'USX', label: 'Browse USX files' },
        { key: 'has_usfm', name: 'USFM', label: 'Browse USFM files' },
        { key: 'has_audio', name: 'audio', label: 'Browse audio timings' },
        { key: 'has_alignments', name: 'alignments', label: 'Browse Bible alignments' }
        
    ];
    
    formats.forEach(format => {
        if (langData[format.key]) {
            const dirName = format.key.replace('has_', '');
            html += `<li><a href="https://github.com/${ORG_NAME}/${selectedResource.name}/tree/main/${selectedLanguage}/${dirName}" target="_blank">${format.label}</a></li>`;
        }
    });
    
    html += `<li><a href="https://github.com/${ORG_NAME}/${selectedResource.name}/releases/latest" target="_blank">Download latest release</a></li>`;
    html += '</ul>';
    html += '</div>'; // Close resource-access-column
    html += '</div>'; // Close resource-details-columns
    
    contentDisplayDiv.innerHTML = html;
    contentViewerSection.classList.remove('hidden');
}
    </script>
